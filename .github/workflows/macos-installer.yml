name: macOS installer

# Build the .dmg (+ .zip) on a real macOS runner.
# A macOS app bundle / .dmg can ONLY be built on macOS — it needs Apple's
# hdiutil + codesign, which do NOT exist on Linux or Windows. So the macOS
# installer can ONLY be built here on macos-latest. (This Linux dev box can
# verify the shared electron-builder config via `--linux dir`, but it can
# NOT produce a .dmg.)
#
# COST NOTE: macos-latest runners bill Actions minutes at a 10x multiplier
# on private repos (and use a smaller free-minutes pool) — operationally
# more expensive than the Linux/Windows runners. Keep tag pushes deliberate.
#
# Signing + notarization are CONDITIONAL on the presence of repo secrets.
# The "Configure code signing" step below exports the signing env into
# $GITHUB_ENV ONLY when MAC_CSC_LINK is non-empty, so CSC_LINK is genuinely
# UNSET (not a defined-but-empty string) for unsigned builds:
#   * NO secrets set  -> only CSC_IDENTITY_AUTO_DISCOVERY=false is exported;
#     electron-builder.config.cjs sees no CSC_LINK -> its `signed` branch is
#     false -> mac.identity:null = PROVEN UNSIGNED build (no hardened runtime).
#     APPLE_* are absent, so notarization is skipped. Result: green .dmg/.zip.
#   * Secrets set     -> CSC_LINK/CSC_KEY_PASSWORD + auto-discovery=true are
#     exported, so the config `signed` branch turns on (identity auto-discover,
#     hardened runtime + entitlements); APPLE_* (if set) drive notarization.
# Adding the secrets is the ONLY action needed to turn signing+notarization
# on for the next build — no workflow or config change. See docs/SIGNING.md.
#
# Triggers:
#   - push a tag `vX.Y.Z`  -> builds AND publishes a GitHub Release
#   - manual `workflow_dispatch` -> builds, artifact only (no Release)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

# Needed so a tag build can create/update a GitHub Release.
permissions:
  contents: write

jobs:
  build-macos-installer:
    name: Build macOS dmg installer
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Build app bundles (esbuild -> dist/)
        run: npm run build

      - name: Configure code signing
        # Conditionally EXPORT the signing + notarization env into $GITHUB_ENV
        # so signing is TRULY conditional. The unsigned build must see NO
        # CSC_LINK at all (genuinely UNSET, not a defined-but-empty string):
        # electron-builder 26 treats a defined-but-empty CSC_LINK as a cert
        # PATH and tries to load it from cwd -> "not a file" -> exit 1 (the
        # macOS tag-build failure this fixes). By writing CSC_LINK only when
        # MAC_CSC_LINK is non-empty, the unsigned build's
        # electron-builder.config.cjs `signed` branch resolves to the PROVEN
        # unsigned config (mac.identity:null, no hardened runtime).
        #
        #   * No MAC_CSC_LINK secret -> export ONLY
        #     CSC_IDENTITY_AUTO_DISCOVERY=false (no CSC_LINK, no APPLE_*), so
        #     electron-builder does not probe the keychain and produces a
        #     proven UNSIGNED .dmg/.zip; notarization is skipped silently.
        #   * MAC_CSC_LINK set -> export CSC_LINK / CSC_KEY_PASSWORD +
        #     CSC_IDENTITY_AUTO_DISCOVERY=true so the Developer ID cert is
        #     imported and used. If APPLE_ID is also set, export the APPLE_*
        #     trio so electron-builder notarizes the signed app (mac.notarize
        #     is left UNSET in config -> env-driven). No per-release change.
        #
        # Secret values are referenced ONLY via this step's env block and are
        # NEVER echoed to the log.
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            {
              echo "CSC_LINK=$MAC_CSC_LINK"
              echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"
              echo "CSC_IDENTITY_AUTO_DISCOVERY=true"
            } >> "$GITHUB_ENV"
            if [ -n "$APPLE_ID" ]; then
              {
                echo "APPLE_ID=$APPLE_ID"
                echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD"
                echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
              } >> "$GITHUB_ENV"
              echo "Signing: ON + notarization (APPLE_* present)"
            else
              echo "Signing: ON (no APPLE_* — notarization skipped)"
            fi
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "Signing: OFF — unsigned build"
          fi

      - name: Build macOS dmg + zip (electron-builder)
        # No target/arch args on the CLI: let the electron-builder.config.cjs
        # `mac.target` config drive it (dmg + zip, each for BOTH arm64 + x64).
        # Passing `--mac dmg zip` would override the config arch list and build
        # only the runner's host arch (arm64), dropping the Intel build.
        #
        # No inline CSC/APPLE env here: signing + notarization are driven
        # entirely by what the "Configure code signing" step appended to
        # $GITHUB_ENV. With no secret, CSC_LINK is UNSET -> the config's
        # unsigned branch (identity:null) is used -> proven UNSIGNED build.
        #
        # --config: the build config lives in electron-builder.config.cjs (NOT
        # in package.json's removed `build` key). electron-builder only
        # auto-detects `electron-builder.{cjs,js,yml,...}`, NOT the
        # `*.config.cjs` name, so it is passed explicitly here.
        run: npx electron-builder --config electron-builder.config.cjs --mac --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loom-macos-installer
          path: |
            release/*.dmg
            release/*-mac.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*-mac.zip
