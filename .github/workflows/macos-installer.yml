name: macOS installer

# Build the .dmg (+ .zip) on a real macOS runner.
# A macOS app bundle / .dmg can ONLY be built on macOS — it needs Apple's
# hdiutil + codesign, which do NOT exist on Linux or Windows. So the macOS
# installer can ONLY be built here on macos-latest. (This Linux dev box can
# verify the shared electron-builder config via `--linux dir`, but it can
# NOT produce a .dmg.)
#
# COST NOTE: macos-latest runners bill Actions minutes at a 10x multiplier
# on private repos (and use a smaller free-minutes pool) — operationally
# more expensive than the Linux/Windows runners. Keep tag pushes deliberate.
#
# The build is UNSIGNED + un-notarized by design (identity:null in the
# package.json `mac` config — no Apple Developer ID cert, no notarization).
# No secrets are referenced anywhere in this workflow.
#
# Triggers:
#   - push a tag `vX.Y.Z`  -> builds AND publishes a GitHub Release
#   - manual `workflow_dispatch` -> builds, artifact only (no Release)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

# Needed so a tag build can create/update a GitHub Release.
permissions:
  contents: write

jobs:
  build-macos-installer:
    name: Build macOS dmg installer
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Build app bundles (esbuild -> dist/)
        run: npm run build

      - name: Build macOS dmg + zip (electron-builder, unsigned)
        # No target/arch args on the CLI: let the package.json `mac.target`
        # config drive it (dmg + zip, each for BOTH arm64 + x64). Passing
        # `--mac dmg zip` would override the config arch list and build only
        # the runner's host arch (arm64), dropping the Intel build.
        run: npx electron-builder --mac --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loom-macos-installer
          path: |
            release/*.dmg
            release/*-mac.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*-mac.zip
