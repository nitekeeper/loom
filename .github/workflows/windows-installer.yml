name: Windows installer

# Build the NSIS installer (+ portable .exe) on a real Windows runner.
# This Linux dev box has no Wine/makensis, so the Windows installer can
# ONLY be built here on windows-latest.
#
# Triggers:
#   - push a tag `vX.Y.Z`  -> builds AND publishes a GitHub Release
#   - manual `workflow_dispatch` -> builds, artifact only (no Release)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

# Needed so a tag build can create/update a GitHub Release.
permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows NSIS installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Build app bundles (esbuild -> dist/)
        run: npm run build

      - name: Build Windows installer + portable (electron-builder)
        # Code signing is CONDITIONAL on the presence of repo secrets.
        # electron-builder signs the .exe / installer IFF CSC_LINK is a
        # non-empty base64 .pfx. When the WIN_CSC_LINK secret is unset, the
        # ${{ secrets.* }} expressions render as EMPTY strings, so CSC_LINK
        # is empty -> electron-builder skips signing and produces the same
        # UNSIGNED installers as today (no error). Add WIN_CSC_LINK +
        # WIN_CSC_KEY_PASSWORD secrets to turn signing on automatically on
        # the next build — no workflow change needed. See docs/SIGNING.md.
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win nsis portable --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loom-windows-installer
          path: release/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
