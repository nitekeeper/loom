name: E2E (Electron)

# TIER 2 — Playwright Electron end-to-end tests (test/e2e/).
#
# These launch the REAL built app (dist/main.cjs) via Playwright's `_electron`
# API: a real Chromium renderer + the real main process. This is the ONLY layer
# that exercises the main-process halves of the navigable-links feature — the
# OPEN_EXTERNAL IPC re-validation and the BrowserWindow nav guard (will-navigate
# + setWindowOpenHandler). The node --test suites (`npm test`) and the jsdom
# Tier-1 harness cannot reach those.
#
# WHY xvfb: Electron needs a display server even for a hidden/headless window.
# ubuntu-latest is headless, so we run under `xvfb-run -a`, which spins up a
# virtual X server for the process. (This is also why the suite does NOT run in
# the WSL sandbox — see test/e2e/README.md — only in CI / on real hardware.)
#
# NO `npx playwright install`: `_electron` launches the app's OWN bundled
# electron (a devDependency installed by `npm ci`), not a Playwright-managed
# browser, so there are no browser binaries to download.
#
# Triggers: pushes + PRs that touch the feature's code, its tests, or this
# workflow; plus manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'test/e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'
  workflow_dispatch: {}

jobs:
  e2e:
    name: Playwright Electron e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Type-check e2e spec + Playwright config (display-free, fail fast)
        # The base `npm run typecheck` scopes tsc to src/** and excludes test/,
        # so it never sees the e2e spec or playwright.config.ts. This step
        # type-checks ONLY those artifacts under the same strict options, so a
        # type regression in the spec fails HERE in seconds — without a display
        # — instead of only when Electron actually launches below.
        run: npm run typecheck:e2e

      - name: Build app bundles (esbuild -> dist/)
        # dist/main.cjs is a prerequisite: the e2e suite launches the built
        # bundle, not the TS sources. The spec asserts it exists with a clear
        # message, but building here keeps the failure mode obvious.
        run: npm run build

      - name: Run Playwright Electron e2e (under xvfb)
        # xvfb-run -a provides the virtual display Electron requires on a
        # headless runner; -a picks a free display number automatically.
        run: xvfb-run -a npm run test:e2e

      - name: Upload Playwright report
        # Always upload so a failing run still yields the HTML report for triage.
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 14
