name: E2E (Electron)

# TIER 2 — Playwright Electron end-to-end tests (test/e2e/).
#
# These launch the REAL built app (dist/main.cjs) via Playwright's `_electron`
# API: a real Chromium renderer + the real main process. This is the ONLY layer
# that exercises the main-process halves of the navigable-links feature — the
# OPEN_EXTERNAL IPC re-validation and the BrowserWindow nav guard (will-navigate
# + setWindowOpenHandler). The node --test suites (`npm test`) and the jsdom
# Tier-1 harness cannot reach those.
#
# WHY xvfb: Electron needs a display server even for a hidden/headless window.
# ubuntu-latest is headless, so we run under `xvfb-run -a`, which spins up a
# virtual X server for the process. (This is also why the suite does NOT run in
# the WSL sandbox — see test/e2e/README.md — only in CI / on real hardware.)
#
# NO `npx playwright install`: `_electron` launches the app's OWN bundled
# electron (a devDependency installed by `npm ci`), not a Playwright-managed
# browser, so there are no browser binaries to download.
#
# Triggers: pushes + PRs that touch the feature's code, its tests, or this
# workflow; plus manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'test/e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'
  workflow_dispatch: {}

jobs:
  e2e:
    name: Playwright Electron e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Install a lightweight window manager (fluxbox)
        # window-controls.e2e.ts tests 2/3/4 (minimize / maximize / double-click
        # maximize) assert against the REAL BrowserWindow.isMinimized() /
        # isMaximized(). Those are WINDOW-MANAGER-dependent on Linux: under bare
        # xvfb (no WM) the maximize/minimize/restore semantics are not honored, so
        # the state can fail to flip and the polled assertions go flaky. fluxbox is
        # a tiny EWMH-compliant WM that implements those window operations, so the
        # state transitions are real and deterministic. It is started alongside the
        # virtual X server in the run step below.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fluxbox

      - name: Type-check e2e spec + Playwright config (display-free, fail fast)
        # The base `npm run typecheck` scopes tsc to src/** and excludes test/,
        # so it never sees the e2e spec or playwright.config.ts. This step
        # type-checks ONLY those artifacts under the same strict options, so a
        # type regression in the spec fails HERE in seconds — without a display
        # — instead of only when Electron actually launches below.
        run: npm run typecheck:e2e

      - name: Build app bundles (esbuild -> dist/)
        # dist/main.cjs is a prerequisite: the e2e suite launches the built
        # bundle, not the TS sources. The spec asserts it exists with a clear
        # message, but building here keeps the failure mode obvious.
        run: npm run build

      - name: Run Playwright Electron e2e (under xvfb + fluxbox)
        # xvfb-run -a provides the virtual display Electron requires on a
        # headless runner; -a picks a free display number automatically. We then
        # start fluxbox on that SAME display (the DISPLAY env xvfb-run exports
        # inside its shell) so a real window manager honors minimize / maximize /
        # restore — otherwise those BrowserWindow state transitions are flaky
        # under bare xvfb (see window-controls.e2e.ts tests 2/3/4). fluxbox is
        # backgrounded and given a moment to claim the root window before the
        # suite launches Electron.
        run: |
          xvfb-run -a bash -c '
            fluxbox >/dev/null 2>&1 &
            sleep 2
            npm run test:e2e
          '

      - name: Upload Playwright report
        # Always upload so a failing run still yields the HTML report for triage.
        # continue-on-error: storage quota hits must not fail a green test run.
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 14
